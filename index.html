function getBMR({weight,height,age,sex}){return sex==="male"?10*weight+6.25*height-5*age+5:10*weight+6.25*height-5*age-161;}
const ACT={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very:1.9};
function getTDEE(d){return getBMR(d)*ACT[d.activity];}
function getTarget(d){
  const t=getTDEE(d);
  if(d.goal==="loss"){const def={slow:250,moderate:500,fast:750}[d.lossRate]||500;return Math.max(1200,t-def);}
  if(d.goal==="gain")return t+300;
  return t;
}
function weekKcal(base,w,goal){
  if(goal==="loss")return Math.round(base-w*50);
  if(goal==="gain")return Math.round(base+w*50);
  return Math.round(base);
}
function scaleMeal(meal,kcal){
  const base=meal.macros.p*4+meal.macros.c*4+meal.macros.f*9;
  const r=kcal/base;
  return{...meal,ingredients:meal.ingredients.map(i=>({...i,q:Math.round(i.q*r*10)/10})),macros:{p:Math.round(meal.macros.p*r),c:Math.round(meal.macros.c*r),f:Math.round(meal.macros.f*r)},kcal:Math.round(base*r)};
}
function buildList(plan){
  const map={};
  Object.values(plan).forEach(day=>{Object.values(day).forEach(meal=>{if(!meal)return;meal.ingredients.forEach(({n,q,u})=>{const k=n.toLowerCase();if(!map[k])map[k]={name:n,qty:0,unit:u,status:"needed"};map[k].qty+=q;});});});
  return map;
}

function Field({label,helper,children}){

}
function Inp({value,onChange,type="text",placeholder,style={}}){

}
function StatChip({label,value,accent}){

function CookMode({meal,onClose}){
  const[step,setStep]=useState(0);
  const steps=meal.steps||[];
  const pct=Math.round(((step+1)/steps.length)*100);
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,background:"#000",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <button onClick={onClose} style={{background:"transparent",border:"none",color:T.sub,fontSize:14,cursor:"pointer"}}>Exit</button>
        <div style={{fontSize:12,fontWeight:700,color:T.lime}}>COOK MODE</div>
        <div style={{fontSize:12,color:T.sub}}>Step {step+1}/{steps.length}</div>
      </div>
      <div style={{height:3,background:T.border,flexShrink:0}}><div style={{height:"100%",width:`${pct}%`,background:T.lime,transition:"width 0.4s ease"}}/></div>
      <div style={{padding:"20px 24px 12px",flexShrink:0}}>
        <div style={{fontSize:11,color:T.sub,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:6}}>Now cooking</div>
        <div style={{fontSize:18,fontWeight:700}}>{meal.name}</div>
      </div>
      <div style={{flex:1,padding:"0 24px",display:"flex",flexDirection:"column",justifyContent:"center",overflowY:"auto"}}>
        <div style={{width:48,height:48,borderRadius:"50%",background:T.lime,color:"#000",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,marginBottom:20,boxShadow:`0 0 20px ${T.lime}44`}}>{step+1}</div>
        <div style={{fontSize:20,fontWeight:500,lineHeight:1.7}}>{steps[step]}</div>
      </div>
      <div style={{padding:"20px 24px 40px",display:"flex",gap:12,flexShrink:0,borderTop:`1px solid ${T.border}`}}>
        {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,background:T.s2,border:`1px solid ${T.border}`,color:T.sub,borderRadius:12,padding:16,fontWeight:600,fontSize:15,cursor:"pointer"}}>Back</button>}
        {step<steps.length-1
          ?<button onClick={()=>setStep(s=>s+1)} style={{flex:2,background:T.lime,border:"none",color:"#000",borderRadius:12,padding:16,fontWeight:700,fontSize:15,cursor:"pointer"}}>Next step</button>
          :<button onClick={onClose} style={{flex:2,background:T.green,border:"none",color:"#000",borderRadius:12,padding:16,fontWeight:700,fontSize:15,cursor:"pointer"}}>Done cooking!</button>
        }
      </div>
    </div>
  );
}

                  {meal.tags.map(t=><div key={t} style={{background:T.red+"15",border:`1px solid ${T.red}44`,borderRadius:20,padding:"4px 12px",fontSize:12,color:T.red,fontWeight:500}}>{t}</div>)}

              </div>
            )}
          </div>
        )}
      </div>
      <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"16px 20px 36px",background:`linear-gradient(transparent,${T.bg} 30%)`,display:"flex",gap:10}}>
        <button onClick={onStartCook} style={{flex:1,background:T.lime,border:"none",color:"#000",borderRadius:12,padding:15,fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:`0 4px 20px ${T.lime}44`}}>
          🍳 Start cooking
        </button>
      </div>
    </div>
  );
}

  useEffect(()=>{
    const t1=setTimeout(()=>setPhase(1),300);
    const t2=setTimeout(()=>setPhase(2),900);

          transform:phase>=3?"translateY(0) scale(1)":"translateY(14px) scale(0.97)",
          transition:"opacity 0.45s ease, transform 0.45s ease",
          width:"100%",display:"flex",justifyContent:"center",marginBottom:52

            onMouseEnter={e=>{e.currentTarget.style.background=T.lime;e.currentTarget.style.color="#000";}}
            onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=T.lime;}}

        </div>

        <div style={{
          opacity:phase>=3?1:0,
          transform:phase>=3?"translateY(0)":"translateY(8px)",
          transition:"opacity 0.45s ease 0.15s, transform 0.45s ease 0.15s",
          display:"flex",gap:0,width:"100%",justifyContent:"center"
        }}>

              <div style={{fontSize:9,color:T.muted,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:4}}>{l}</div>
            </div>
          ))}
        </div>

      </div>
    </div>
  );

const Q_STEPS=[{title:"Your details",sub:"Personalises everything in the app."},{title:"Your goal",sub:"What are you working towards?"},{title:"Body stats",sub:"We use these to calculate your exact calorie target."},{title:"Activity level",sub:"How much do you train?"},{title:"Food preferences",sub:"Any allergies or things you avoid?"}];

function Questionnaire({onComplete}){
  const[step,setStep]=useState(0);
  const[f,setF]=useState({firstName:"",lastName:"",email:"",goal:"maintenance",lossRate:"moderate",currentWeight:"",targetWeight:"",height:"",age:"",sex:"male",activity:"moderate",allergies:[],prefs:[]});
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const tog=(k,v)=>setF(x=>({...x,[k]:x[k].includes(v)?x[k].filter(i=>i!==v):[...x[k],v]}));
  const pages=[
    <div key="0">
      <Field label="First name"><Inp value={f.firstName} onChange={e=>set("firstName",e.target.value)} placeholder="Alex"/></Field>
      <Field label="Last name"><Inp value={f.lastName} onChange={e=>set("lastName",e.target.value)} placeholder="Johnson"/></Field>
      <Field label="Email" helper="Your shopping list gets sent here weekly."><Inp value={f.email} onChange={e=>set("email",e.target.value)} type="email" placeholder="alex@email.com"/></Field>
    </div>,
    <div key="1">
      {[{v:"loss",l:"Lose body fat",d:"Progressive calorie deficit"},{v:"gain",l:"Build muscle",d:"Calorie surplus for hypertrophy"},{v:"maintenance",l:"Maintain and perform",d:"Fuel performance, hold composition"}].map(({v,l,d})=>(
        <div key={v} onClick={()=>set("goal",v)} style={{background:f.goal===v?T.lime+"11":T.s2,border:`1px solid ${f.goal===v?T.lime:T.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10,cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:3}}><span style={{fontWeight:600,color:f.goal===v?T.lime:T.white}}>{l}</span>{f.goal===v&&<span style={{marginLeft:"auto",color:T.lime,fontSize:18}}>✓</span>}</div>
          <div style={{fontSize:12,color:T.sub}}>{d}</div>
        </div>
      ))}
      {f.goal==="loss"&&<Field label="Rate of loss" helper="Slower = more muscle preserved."><Sel value={f.lossRate} onChange={e=>set("lossRate",e.target.value)} options={[{v:"slow",l:"Slow — 0.25 kg/week"},{v:"moderate",l:"Moderate — 0.5 kg/week"},{v:"fast",l:"Aggressive — 0.75 kg/week"}]}/></Field>}
    </div>,
    <div key="2">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Current weight (kg)"><Inp value={f.currentWeight} onChange={e=>set("currentWeight",+e.target.value)} type="number" placeholder="75"/></Field>
        <Field label="Target weight (kg)"><Inp value={f.targetWeight} onChange={e=>set("targetWeight",+e.target.value)} type="number" placeholder="70"/></Field>
        <Field label="Height (cm)"><Inp value={f.height} onChange={e=>set("height",+e.target.value)} type="number" placeholder="175"/></Field>

function PlanScreen({userData,plan,setPlan,onOpenRecipe,onOpenPicker}){
  const[week,setWeek]=useState(0);
  const[openDay,setOpenDay]=useState("Monday");
  const base=userData?Math.round(getTarget(userData)):2000;
  const wKcal=weekKcal(base,week,userData?.goal);
  const slotKcal=s=>Math.round(wKcal*SLOT_SPLIT[s]);
  const slotEmoji={breakfast:"☀️",lunch:"🌤",snack:"⚡",dinner:"🌙"};
  const autoFill=()=>{
    const np={};
    DAYS.forEach((day,di)=>{np[day]={};Object.keys(ALL).forEach(slot=>{const pool=ALL[slot];np[day][slot]=scaleMeal(pool[di%pool.length],slotKcal(slot));});});
    setPlan(np);
  };
  const dayKcal=day=>{if(!plan[day])return 0;return Object.values(plan[day]).reduce((s,m)=>s+(m?m.macros.p*4+m.macros.c*4+m.macros.f*9:0),0);};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:22}}>Week Plan</div>
        <button onClick={autoFill} style={{background:T.lime,color:"#000",border:"none",borderRadius:20,padding:"7px 18px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Auto-fill</button>
      </div>
      <div style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 16px",marginBottom:16}}>
        <div style={{fontSize:11,color:T.sub,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>4-Week progression</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {[0,1,2,3].map(w=>{
            const kc=weekKcal(base,w,userData?.goal);
            const ref=weekKcal(base,0,userData?.goal||"maintenance");
            const h=Math.max(10,Math.round((kc/ref)*48));
            return(
              <div key={w} onClick={()=>setWeek(w)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer"}}>
                <div style={{fontSize:10,fontWeight:700,color:w===week?T.lime:T.muted}}>W{w+1}</div>
                <div style={{width:"100%",height:h,background:w===week?T.lime:T.border,borderRadius:3,transition:"all 0.25s",minHeight:8}}/>
                <div style={{fontSize:10,color:w===week?T.lime:T.muted}}>{kc}</div>
              </div>
            );
          })}
        </div>
      </div>
      {DAYS.map(day=>(
        <div key={day} style={{marginBottom:6}}>
          <div onClick={()=>setOpenDay(openDay===day?null:day)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.s1,border:`1px solid ${openDay===day?T.lime+"55":T.border}`,borderRadius:openDay===day?"12px 12px 0 0":12,padding:"13px 16px",cursor:"pointer"}}>
            <div style={{fontWeight:600,fontSize:15}}>{day}</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {dayKcal(day)>0&&<span style={{fontSize:11,color:T.lime,fontWeight:600}}>{dayKcal(day)} kcal</span>}
              <span style={{color:T.muted,display:"inline-block",transform:openDay===day?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
            </div>
          </div>
          {openDay===day&&(
            <div style={{background:T.s2,border:`1px solid ${T.lime}33`,borderTop:"none",borderRadius:"0 0 12px 12px"}}>
              {["breakfast","lunch","snack","dinner"].map((slot,si,arr)=>{
                const meal=plan[day]?.[slot];
                return(
                  <div key={slot} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:si<arr.length-1?`1px solid ${T.border}`:"none"}}>
                    <div style={{fontSize:16,minWidth:24,textAlign:"center"}}>{slotEmoji[slot]}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{slot}</div>
                      {meal
                        ?<div onClick={()=>onOpenRecipe(meal)} style={{cursor:"pointer"}}>
                          <div style={{fontSize:13,fontWeight:600,marginBottom:1}}>{meal.name}</div>
                          <div style={{fontSize:11,color:T.sub}}>{meal.kcal||"—"} kcal · P{meal.macros.p}g C{meal.macros.c}g F{meal.macros.f}g</div>
                        </div>
                        :<div style={{fontSize:13,color:T.muted,fontStyle:"italic"}}>Not planned</div>
                      }
                    </div>
                    <button onClick={()=>onOpenPicker({day,slot,targetKcal:slotKcal(slot)})} style={{background:T.s3,border:`1px solid ${T.border}`,color:T.sub,borderRadius:8,padding:"5px 10px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>{meal?"Swap":"+ Add"}</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

const STATUSES=["needed","got it","don't have"];
const STATUS_META={"needed":{color:T.white,bg:"transparent",label:"To Buy"},"got it":{color:T.green,bg:T.green+"15",label:"Got It"},"don't have":{color:T.red,bg:T.red+"15",label:"Missing"}};

function ShoppingScreen({plan}){
  const[rawList,setRawList]=useState({});
  const[view,setView]=useState("checklist");
  const[sent,setSent]=useState(false);
  useEffect(()=>{
    const built=buildList(plan);
    setRawList(prev=>{const merged={};Object.entries(built).forEach(([k,v])=>{merged[k]={...v,status:prev[k]?.status||"needed"};});return merged;});
  },[plan]);
  const setStatus=(key,status)=>setRawList(l=>({...l,[key]:{...l[key],status}}));
  const byStatus={};STATUSES.forEach(s=>{byStatus[s]=[];});
  Object.entries(rawList).forEach(([k,v])=>{if(!byStatus[v.status])byStatus[v.status]=[];byStatus[v.status].push([k,v]);});
  const gotCount=byStatus["got it"]?.length||0;
  const totalCount=Object.keys(rawList).length;
  const pct=totalCount?Math.round((gotCount/totalCount)*100):0;
  if(!totalCount)return(<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:56,marginBottom:16}}>🛒</div><div style={{fontWeight:700,fontSize:18,marginBottom:8}}>No meals planned yet</div><div style={{fontSize:14,color:T.sub}}>Add meals to your plan first.</div></div>);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:22}}>Shopping List</div>
        <button onClick={()=>{setSent(true);setTimeout(()=>setSent(false),3000);}} style={{background:sent?T.green+"22":T.lime+"22",border:`1px solid ${sent?T.green:T.lime}`,color:sent?T.green:T.lime,borderRadius:20,padding:"7px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{sent?"✓ Sent!":"📧 Email list"}</button>
      </div>
      <div style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:13}}><span style={{color:T.sub}}>{totalCount} ingredients</span><span style={{color:T.lime,fontWeight:700}}>{pct}% ready</span></div>
        <div style={{height:4,background:T.border,borderRadius:2,overflow:"hidden",marginBottom:12}}><div style={{height:"100%",width:`${pct}%`,background:T.lime,borderRadius:2,transition:"width 0.4s"}}/></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
          {STATUSES.map(s=>(
            <div key={s} style={{textAlign:"center",background:T.s2,borderRadius:8,padding:"8px 4px"}}>
              <div style={{fontSize:16,fontWeight:800,color:STATUS_META[s].color||T.white,marginTop:2}}>{byStatus[s]?.length||0}</div>
              <div style={{fontSize:10,color:T.muted,marginTop:1}}>{STATUS_META[s].label}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:16}}>
        {[["checklist","Checklist"],["summary","Summary"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{background:view===v?T.lime+"22":T.s2,border:`1px solid ${view===v?T.lime:T.border}`,color:view===v?T.lime:T.sub,borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      {view==="checklist"&&(
        <div>
          {Object.entries(rawList).sort(([,a],[,b])=>{const o={needed:0,"got it":1,"don't have":2};return o[a.status]-o[b.status];}).map(([key,item])=>{
            const meta=STATUS_META[item.status];
            return(
              <div key={key} style={{background:meta.bg||T.s1,border:`1px solid ${item.status!=="needed"?meta.color+"33":T.border}`,borderRadius:10,padding:"12px 14px",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,marginBottom:2,color:item.status==="got it"?T.muted:T.white,textDecoration:item.status==="got it"?"line-through":"none"}}>{item.name}</div>
                    <div style={{fontSize:11,color:T.sub}}>{Math.round(item.qty*10)/10} {item.unit} for the week</div>
                  </div>
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    {STATUSES.map(s=>{
                      const m=STATUS_META[s];const active=item.status===s;
                      return(<button key={s} onClick={()=>setStatus(key,s)} title={m.label} style={{padding:"4px 8px",borderRadius:8,background:active?m.color+"22":"transparent",border:`1px solid ${active?m.color:T.border}`,fontSize:10,color:active?m.color:T.muted,cursor:"pointer",whiteSpace:"nowrap"}}>{m.label}</button>);
                    })}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {view==="summary"&&(
        <div>
          {STATUSES.map(s=>{
            const items=byStatus[s];if(!items?.length)return null;const meta=STATUS_META[s];
            return(
              <div key={s} style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:13,fontWeight:700,color:meta.color,textTransform:"uppercase",letterSpacing:"0.08em"}}>{meta.label}</span>
                  <span style={{fontSize:12,color:T.muted,marginLeft:"auto"}}>{items.length} items</span>
                </div>
                <div style={{background:T.s1,border:`1px solid ${meta.color+"33"}`,borderRadius:12,overflow:"hidden"}}>
                  {items.map(([key,item],i,arr)=>(
                    <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
                      <span style={{fontSize:13,color:s==="got it"?T.sub:T.white,textDecoration:s==="got it"?"line-through":"none"}}>{item.name}</span>
                      <span style={{fontSize:12,color:meta.color,fontWeight:600}}>{Math.round(item.qty*10)/10} {item.unit}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function RecipesScreen({onOpenRecipe,savedIds,toggleSave}){

  if(search.trim()){const q=search.toLowerCase();pool=pool.filter(m=>m.name.toLowerCase().includes(q)||m.tags?.some(t=>t.includes(q))||m.ingredients?.some(i=>i.n.toLowerCase().includes(q)));}

                  <div style={{fontSize:11,color:T.sub}}>📋 {meal.steps?.length} steps</div>
                </div>
                <button onClick={e=>{e.stopPropagation();toggleSave(meal.id);}} style={{background:isSaved?T.red+"20":"transparent",border:`1px solid ${isSaved?T.red+"66":T.border}`,borderRadius:20,padding:"4px 12px",fontSize:12,color:isSaved?T.red:T.muted,cursor:"pointer",fontWeight:isSaved?700:400,transition:"all 0.2s"}}>
                  {isSaved?"❤️ Saved":"♡ Save"}
                </button>
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

function ProfileScreen({userData,setUserData,onReset,weightLog,setWeightLog}){
  const[editWeight,setEditWeight]=useState(false);
  const[newWeight,setNewWeight]=useState("");

  const logWeight=useCallback(()=>{
    const w=parseFloat(newWeight);
    if(!w||w<20||w>300)return;
    const newEntry={week:weightLog.length+1,weight:w,date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})};
    setWeightLog(prev=>[...prev,newEntry]);
    setUserData(prev=>({...prev,weight:w}));
    setNewWeight("");
    setEditWeight(false);
  },[newWeight,weightLog.length,setWeightLog,setUserData]);

  if(!userData)return(<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16}}>👤</div><div style={{color:T.sub}}>Complete the questionnaire to see your profile.</div></div>);

  const bmr=Math.round(getBMR(userData));
  const tdee=Math.round(getTDEE(userData));
  const target=Math.round(getTarget(userData));
  const targetWeight=parseFloat(userData.targetWeight)||0;
  const currentWeight=parseFloat(userData.weight)||0;
  const diff=Math.abs(targetWeight-currentWeight);
  const weeks=userData.goal==="loss"?Math.round(diff/0.5):userData.goal==="gain"?Math.round(diff/0.3):null;
  const totalChange=weightLog.length>1?(weightLog[weightLog.length-1].weight-weightLog[0].weight).toFixed(1):null;
  const changeColor=totalChange===null?T.sub:userData.goal==="loss"?(+totalChange<0?T.green:T.red):(+totalChange>0?T.green:T.red);

  return(
    <div>
      <div style={{fontWeight:700,fontSize:22,marginBottom:20}}>Profile</div>
      <div style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,padding:18,marginBottom:10}}>
        <div style={{fontSize:10,color:T.lime,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>AmpUp</div>
        <div style={{fontSize:22,fontWeight:700}}>Hey, {userData.firstName} 👋</div>
        <div style={{fontSize:13,color:T.sub,marginTop:3}}>{userData.email}</div>
      </div>
      <div style={{background:T.lime+"0d",border:`1px solid ${T.lime}33`,borderRadius:14,padding:18,marginBottom:10}}>
        <div style={{fontSize:10,color:T.lime,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Daily target</div>
        <div style={{fontSize:38,fontWeight:800,color:T.lime}}>{target} <span style={{fontSize:16,fontWeight:400,color:T.sub}}>kcal/day</span></div>
        <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["Protein",Math.round(target*0.30/4)+"g",T.green],["Carbs",Math.round(target*0.40/4)+"g",T.lime],["Fat",Math.round(target*0.30/9)+"g",T.blue]].map(([label,val,col])=>(
            <div key={label} style={{background:T.s1,borderRadius:10,padding:"10px 8px",textAlign:"center",border:`1px solid ${col}22`}}>
              <div style={{fontSize:16,fontWeight:800,color:col}}>{val}</div>
              <div style={{fontSize:10,color:T.muted,marginTop:2}}>{label}</div>
            </div>
          ))}
        </div>
        {weeks!==null&&diff>0&&<div style={{marginTop:10,fontSize:12,color:T.sub,background:T.s1,borderRadius:8,padding:"8px 12px"}}>{diff.toFixed(1)} kg to {userData.goal==="loss"?"lose":"gain"} · ~{weeks} weeks at this rate</div>}
      </div>
      <div style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,padding:16,marginBottom:10}}>
        <div style={{fontSize:10,color:T.lime,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>Meal calorie split</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["☀️ Breakfast",SLOT_SPLIT.breakfast],["🌤 Lunch",SLOT_SPLIT.lunch],["⚡ Snack",SLOT_SPLIT.snack],["🌙 Dinner",SLOT_SPLIT.dinner]].map(([label,split])=>(
            <div key={label} style={{background:T.s2,borderRadius:10,padding:"10px 12px",border:`1px solid ${T.border}`}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:4}}>{label}</div>
              <div style={{fontSize:18,fontWeight:800}}>{Math.round(target*split)}</div>
              <div style={{fontSize:10,color:T.muted}}>kcal · {Math.round(split*100)}%</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,overflow:"hidden",marginBottom:10}}>
        <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:T.sub,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Current weight</div>
            <div style={{fontSize:22,fontWeight:800}}>{userData.weight} <span style={{fontSize:13,color:T.sub}}>kg</span>
              {totalChange!==null&&<span style={{fontSize:13,fontWeight:600,color:changeColor,marginLeft:8}}>{+totalChange>0?"+":""}{totalChange} kg</span>}
            </div>
          </div>
          <button onClick={()=>{setEditWeight(v=>!v);setNewWeight("");}} style={{background:editWeight?T.s3:T.lime+"22",border:`1px solid ${editWeight?T.border:T.lime}`,color:editWeight?T.sub:T.lime,borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            {editWeight?"Cancel":"Log weight"}
          </button>
        </div>
        {editWeight&&(
          <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`}}>
            <div style={{display:"flex",gap:8}}>
              <Inp value={newWeight} onChange={e=>setNewWeight(e.target.value)} type="number" placeholder={`${userData.weight}`} style={{flex:1}}/>
              <button onClick={logWeight} style={{background:T.lime,color:"#000",border:"none",borderRadius:10,padding:"12px 18px",fontWeight:700,fontSize:13,cursor:"pointer"}}>Save</button>
            </div>
          </div>
        )}
        {weightLog.length>0&&(
          <div>
            {weightLog.map((entry,i)=>{
              const prevEntry=i>0?weightLog[i-1]:null;
              const delta=prevEntry?(entry.weight-prevEntry.weight).toFixed(1):null;
              const deltaColor=delta===null?T.muted:userData.goal==="loss"?(+delta<0?T.green:T.red):(+delta>0?T.green:T.red);
              return(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:i<weightLog.length-1?`1px solid ${T.border}`:"none"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:i===weightLog.length-1?T.lime:T.white}}>Week {entry.week}</div>
                    <div style={{fontSize:11,color:T.muted}}>{entry.date}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:700,color:i===weightLog.length-1?T.lime:T.white}}>{entry.weight} kg</div>
                    {delta!==null&&(<div style={{fontSize:11,color:deltaColor,fontWeight:600}}>{+delta>0?"+":""}{delta} kg</div>)}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <StatChip label="BMR" value={`${bmr} kcal`}/>
        <StatChip label="TDEE" value={`${tdee} kcal`}/>
        <StatChip label="Goal" value={userData.goal==="loss"?"Fat Loss":userData.goal==="gain"?"Muscle Gain":"Maintain"} accent={T.lime}/>
        <StatChip label="Activity" value={{sedentary:"Sedentary",light:"Light",moderate:"Moderate",active:"Active",very:"Athlete"}[userData.activity]}/>
      </div>
      <button onClick={onReset} style={{width:"100%",background:"transparent",border:`1px solid ${T.border}`,color:T.sub,borderRadius:12,padding:14,fontSize:14,cursor:"pointer",marginTop:4}}>Reset and start fresh</button>
    </div>
  );
}

const NAV_ICONS={
  meals:<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-8-15.03-8-15.03 0h15.03zM1.02 17h15v2h-15z"/></svg>,
  plan:<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>,
  shop:<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.1 17 7 17h11v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H18c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0022.46 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>,
  recipes:<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>,
  profile:<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>,
};

function App(){
  const[screen,setScreen]=useState("welcome");
  const[tab,setTab]=useState("plan");
  const[userData,setUserData]=useState(null);
  const[plan,setPlan]=useState({});
  const[weightLog,setWeightLog]=useState([]);
  const[savedIds,setSavedIds]=useState([]);
  const[recipeDetail,setRecipeDetail]=useState(null);
  const[cookMeal,setCookMeal]=useState(null);
  const[pickerConfig,setPickerConfig]=useState(null);

  const toggleSave=(id)=>setSavedIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const handleComplete=(data)=>{
    const d={...data,weight:+data.currentWeight};
    setUserData(d);
    setWeightLog([{week:1,weight:+data.currentWeight,date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})}]);
    setScreen("app");
  };

  const handleReset=()=>{
    setScreen("welcome");setUserData(null);setPlan({});setWeightLog([]);
    setRecipeDetail(null);setCookMeal(null);setPickerConfig(null);
  };

  const openRecipe=(meal)=>setRecipeDetail(meal);
  const closeRecipe=()=>setRecipeDetail(null);
  const startCook=()=>{if(recipeDetail)setCookMeal(recipeDetail);};
  const closeCook=()=>setCookMeal(null);
  const openPicker=(cfg)=>setPickerConfig(cfg);
  const closePicker=()=>setPickerConfig(null);
  const handlePick=(meal)=>{
    if(!pickerConfig)return;
    const{day,slot}=pickerConfig;
    const p={...plan};if(!p[day])p[day]={};
    p[day][slot]=meal;setPlan(p);setPickerConfig(null);
  };

  return(
    <div style={{background:T.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",color:T.white,fontFamily:"'DM Sans',sans-serif"}}>
      {screen==="welcome"&&<WelcomeScreen onStart={()=>setScreen("onboard")}/>}
      {screen==="onboard"&&<Questionnaire onComplete={handleComplete}/>}
      {screen==="app"&&(
        <>
          <div style={{background:T.s1,borderBottom:`1px solid ${T.border}`,padding:"14px 20px",position:"sticky",top:0,zIndex:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:T.lime,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}}>AmpUp</div>
                <div style={{fontSize:13,color:T.sub,marginTop:1}}>Hey {userData?.firstName} · {userData?Math.round(getTarget(userData)):"—"} kcal/day</div>
              </div>
              <div style={{background:T.lime+"15",border:`1px solid ${T.lime}33`,borderRadius:16,padding:"3px 12px",fontSize:11,color:T.lime,fontWeight:600}}>Active</div>
            </div>
          </div>
          <div style={{padding:"22px 16px 100px"}}>
            {tab==="meals"   &&<MealsScreen onOpenRecipe={openRecipe}/>}
            {tab==="plan"    &&<PlanScreen userData={userData} plan={plan} setPlan={setPlan} onOpenRecipe={openRecipe} onOpenPicker={openPicker}/>}
            {tab==="shop"    &&<ShoppingScreen plan={plan}/>}
            {tab==="recipes" &&<RecipesScreen onOpenRecipe={openRecipe} savedIds={savedIds} toggleSave={toggleSave}/>}
            {tab==="profile" &&<ProfileScreen userData={userData} setUserData={setUserData} onReset={handleReset} weightLog={weightLog} setWeightLog={setWeightLog}/>}
          </div>
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:T.s1,borderTop:`1px solid ${T.border}`,display:"flex",zIndex:20}}>
            {["meals","plan","shop","recipes","profile"].map(key=>{
              const labels={meals:"Meals",plan:"Plan",shop:"Shop",recipes:"Recipes",profile:"Profile"};
              const active=tab===key;
              return(
                <button key={key} onClick={()=>setTab(key)} style={{flex:1,padding:"10px 0 14px",background:"none",border:"none",color:active?T.lime:T.muted,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,fontSize:10,fontWeight:active?700:400}}>
                  <span style={{transform:active?"scale(1.1)":"scale(1)",transition:"transform 0.15s",display:"inline-block"}}>{NAV_ICONS[key]}</span>
                  {labels[key]}
                </button>
              );
            })}
          </div>
        </>
      )}
      {pickerConfig&&(
        <Drawer open={true} onClose={closePicker} title={`Choose ${pickerConfig.slot}`} sub={`${pickerConfig.day} · Target ~${pickerConfig.targetKcal} kcal`}>
          {(ALL[pickerConfig.slot]||[]).map(meal=>(
            <div key={meal.id} onClick={()=>handlePick(scaleMeal(meal,pickerConfig.targetKcal))} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}}>
              <div style={{fontSize:28,minWidth:38,textAlign:"center"}}>{meal.img}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{meal.name}</div>
                <div style={{fontSize:11,color:T.sub}}>P{meal.macros.p}g · C{meal.macros.c}g · F{meal.macros.f}g</div>
              </div>
              <div style={{color:T.muted,fontSize:18}}>›</div>
            </div>
          ))}
        </Drawer>
      )}
      {recipeDetail&&(<RecipeDetail meal={recipeDetail} onClose={closeRecipe} onStartCook={startCook}/>)}
      {cookMeal&&<CookMode meal={cookMeal} onClose={closeCook}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>console.log('AmpUp SW registered',r.scope))
      .catch(e=>console.warn('SW registration failed',e));
  });
}
</script>
</body>
</html>
